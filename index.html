<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 单词家族生成器 (批量专业版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --primary-color: #7d5a50;
            --bg-grid: #e5efff;
            --line-color: #d98c5f;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* 配置区域 */
        .config-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        
        h3 { margin-top: 0; color: #fff; text-align: center; text-shadow: 0 0 10px rgba(125, 90, 80, 0.5); }
        .tips { font-size: 12px; color: #bbb; margin-bottom: 8px; display: block; text-align: center; }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }
        input::placeholder, textarea::placeholder { color: #aaa; }
        textarea { resize: vertical; min-height: 80px; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 14px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #375abd; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #downloadBtn { background: #28a745; display: none; }
        #downloadBtn:hover { background: #218838; }

        /* 结果展示网格区 */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* 手机端 > 3 个时三列显示逻辑 */
        @media (max-width: 768px) {
            .results-grid.many-items {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
        }

        /* 单个图片的占位框/图片框 */
        .image-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 380 / 520; /* 保持原卡片比例 */
            position: relative;
        }

        .result-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .status-text {
            font-size: 14px;
            color: #666;
            text-align: center;
            padding: 10px;
        }
        .error-text { color: #dc3545; font-weight: bold; }
        .success-text { color: #28a745; }

        /* ------------------ 以下为不可见的渲染区样式 ------------------ */
        #stagingArea {
            position: absolute;
            top: -9999px;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
        }

        .card-container {
            width: 380px; 
            height: 520px;
            background-color: var(--bg-grid);
            background-image: 
                linear-gradient(#d1e3ff 1px, transparent 1px),
                linear-gradient(90deg, #d1e3ff 1px, transparent 1px);
            background-size: 20px 20px;
            border: 1px solid #b0c4de;
            border-radius: 12px;
            position: relative;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .header-box {
            background: white;
            border: 2px solid #b0c4de;
            width: 80%;
            margin: 30px auto;
            text-align: center;
            padding: 12px;
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        .center-word {
            position: absolute;
            top: 58%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            background: white;
            padding: 6px 12px;
            border: 1px solid #b0c4de;
            border-radius: 4px;
            z-index: 100;
            white-space: nowrap;
        }

        .word-item {
            position: absolute;
            font-size: 15px;
            color: #333;
            z-index: 110;
            background: rgba(229, 239, 255, 0.9);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            max-width: 90px;
            word-break: break-word;
            line-height: 1.2;
            text-align: center;
        }

        .line {
            position: absolute;
            height: 1.5px;
            background: var(--line-color);
            transform-origin: left center;
            z-index: 5;
        }
    </style>
</head>
<body>

<div class="config-panel">
    <h3>Gemini 单词家族批量生成</h3>
    <input type="password" id="apiKey" placeholder="输入您的 Gemini API Key" oninput="saveApiKey()">
    <span class="tips">支持批量生成，多个词汇请用分号 (;) 或换行隔开</span>
    <textarea id="topicInput" placeholder="例如: 废除; 繁荣; 污染; 保护"></textarea>
    
    <div class="btn-group">
        <button id="generateBtn" onclick="startBatchGeneration()">开始批量生成</button>
        <button id="downloadBtn" onclick="downloadAllImages()">打包下载所有图片</button>
    </div>
</div>

<div id="resultsGrid" class="results-grid"></div>

<div id="stagingArea"></div>

<script>
// 全局存储生成的图片数据
let generatedImagesData = [];

// 页面加载时自动从本地读取 API Key
window.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('gemini_key');
    if (savedKey) document.getElementById('apiKey').value = savedKey;
});

// 实时保存 API Key 到本地
function saveApiKey() {
    const key = document.getElementById('apiKey').value.trim();
    localStorage.setItem('gemini_key', key);
}

// 主干调度逻辑
async function startBatchGeneration() {
    const key = document.getElementById('apiKey').value.trim();
    const rawTopic = document.getElementById('topicInput').value;
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resultsGrid = document.getElementById('resultsGrid');
    const stagingArea = document.getElementById('stagingArea');

    if(!key) return alert("请先填写 API Key！");
    
    // 解析关键词，支持中文或英文分号以及换行
    const topics = rawTopic.split(/;|；|\n/).map(t => t.trim()).filter(t => t);
    if(topics.length === 0) return alert("请输入至少一个关键词！");

    // UI 初始化
    generateBtn.disabled = true;
    generateBtn.innerText = '生成中...';
    downloadBtn.style.display = 'none';
    resultsGrid.innerHTML = ''; 
    stagingArea.innerHTML = '';
    generatedImagesData = new Array(topics.length).fill(null);

    // 适配手机端三列显示
    if (topics.length > 3) {
        resultsGrid.classList.add('many-items');
    } else {
        resultsGrid.classList.remove('many-items');
    }

    // 预先创建坑位，保证顺序
    topics.forEach((topic, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'image-wrapper';
        wrapper.id = `wrapper-${index}`;
        wrapper.innerHTML = `<div class="status-text">AI 正在思考<br><b>${topic}</b><br>请稍候...</div>`;
        resultsGrid.appendChild(wrapper);
    });

    // 核心：并发请求。所有词同时发送给 AI，谁先好谁先渲染。
    const promises = topics.map((topic, index) => processSingleTopic(topic, index, key));
    
    await Promise.allSettled(promises);

    // 恢复按钮状态
    generateBtn.disabled = false;
    generateBtn.innerText = '开始批量生成';
    
    // 检查是否有成功生成的图片
    if (generatedImagesData.some(item => item !== null)) {
        downloadBtn.style.display = 'block';
    }
}

// 处理单个词汇的完整流：请求API -> 构建DOM -> 截图生成 -> 填充UI
async function processSingleTopic(topic, index, key) {
    const wrapper = document.getElementById(`wrapper-${index}`);
    const stagingArea = document.getElementById('stagingArea');

    try {
        // 1. 请求 Gemini API
        const prompt = `你是一个英语词汇专家。请围绕中文词"${topic}"，生成一个单词家族 JSON 数据。
    要求：提供10个高级、精准的近义词或相关词，涵盖不同词性。
    严格按照此 JSON 格式返回：{"theme": "${topic}", "pos": "v/n/adj", "words": ["word1", "word2", ...]}。
    不要输出任何多余的文字说明，只要 JSON。`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        
        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
        const data = await response.json();
        
        if (data.error) throw new Error(data.error.message);

        // 2. 解析 JSON (兼容Markdown语法标记)
        const rawText = data.candidates[0].content.parts[0].text;
        const jsonMatch = rawText.match(/\{[\s\S]*\}/); // 智能提取 JSON 部分
        if(!jsonMatch) throw new Error("无法解析 JSON");
        const cleanJson = JSON.parse(jsonMatch[0]);

        // 3. 构建临时不可见 DOM
        const cardDOM = createCardDOM(cleanJson);
        stagingArea.appendChild(cardDOM);

        // 4. 等待字体/布局渲染后，使用 html2canvas 截图 (scale: 2 保证清晰度)
        await new Promise(resolve => setTimeout(resolve, 50)); 
        const canvas = await html2canvas(cardDOM, { 
            scale: 2, 
            backgroundColor: null // 维持原本背景色设定
        });
        const dataUrl = canvas.toDataURL('image/png');

        // 5. 存入数据并渲染到对应的排序坑位中
        generatedImagesData[index] = { theme: cleanJson.theme, dataUrl: dataUrl };
        wrapper.innerHTML = `<img src="${dataUrl}" class="result-img" alt="${cleanJson.theme}">`;

        // 6. 清理临时 DOM
        cardDOM.remove();

    } catch (e) {
        console.error(`"${topic}" 生成失败:`, e);
        wrapper.innerHTML = `<div class="status-text error-text">"${topic}"<br>生成失败</div>`;
    }
}

// 纯 DOM 构建函数 (与旧版逻辑一致，但不再操作全局变量)
function createCardDOM(data) {
    const card = document.createElement('div');
    card.className = 'card-container';

    // Title
    const header = document.createElement('div');
    header.className = 'header-box';
    header.innerText = `单词家族 “${data.theme}”`;
    card.appendChild(header);

    // Center word
    const center = document.createElement('div');
    center.className = 'center-word';
    center.innerText = `${data.pos || ''}. ${data.theme}`;
    card.appendChild(center);

    // Words & Lines
    const centerX = 190;
    const centerY = 300;
    const radius = 100;

    data.words.forEach((word, i) => {
        const angleDeg = (i * (360 / data.words.length)) - 90;
        const angleRad = angleDeg * (Math.PI / 180);
        
        const x = centerX + Math.cos(angleRad) * radius;
        const y = centerY + Math.sin(angleRad) * radius;

        // Word Item
        const el = document.createElement('div');
        el.className = 'word-item';
        el.innerText = word;
        
        const cos = Math.cos(angleRad);
        const sin = Math.sin(angleRad);
        
        let tx = -50;
        if (cos > 0.3) tx = 0; 
        else if (cos < -0.3) tx = -100;

        let ty = -50;
        if (sin > 0.7) ty = 0;
        else if (sin < -0.7) ty = -100;

        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.style.transform = `translate(${tx}%, ${ty}%)`;
        card.appendChild(el);

        // Connection Line
        const line = document.createElement('div');
        line.className = 'line';
        line.style.left = `${centerX}px`;
        line.style.top = `${centerY}px`;
        const lineLength = radius - 25;
        line.style.width = `${lineLength}px`;
        line.style.transform = `rotate(${angleDeg}deg) translate(20px, 0)`; 
        card.appendChild(line);
    });

    return card;
}

// 智能打包/单张下载功能
async function downloadAllImages() {
    // 过滤掉失败的 null
    const validImages = generatedImagesData.filter(item => item !== null);
    
    if(validImages.length === 0) return;

    if(validImages.length === 1) {
        // 单张图片直接下载
        const link = document.createElement('a');
        link.download = `单词家族-${validImages[0].theme}.png`;
        link.href = validImages[0].dataUrl;
        link.click();
    } else {
        // 多张图片使用 JSZip 打包
        const zip = new JSZip();
        
        validImages.forEach(img => {
            // 剥离 Base64 数据头
            const base64Data = img.dataUrl.replace(/^data:image\/(png|jpg);base64,/, "");
            zip.file(`单词家族-${img.theme}.png`, base64Data, {base64: true});
        });

        try {
            const content = await zip.generateAsync({type:"blob"});
            saveAs(content, "单词家族批量文件.zip");
        } catch(e) {
            console.error("ZIP打包失败", e);
            alert("文件打包失败，请检查浏览器权限。");
        }
    }
}
</script>
</body>
</html>
